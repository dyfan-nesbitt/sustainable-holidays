<!DOCTYPE html>
<html lang="en">
<head>
    <script src= "js/preferences.js" defer></script>
    <link rel="stylesheet" href="css/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrewUp - Your Preferences</title>
</head>
<body>
    <header class="site-header">
       <img class="banner-image" src="images/CrewUp_banner.png" alt="">
    </header>
    
    <main class="main-content">
       <form class="questionnaire-form">
        <h2 class="section-title">Holiday Preferences</h2>
        
        <div class="continents-style">
        <section id="continents" class="section continents-section">
            <h3 class="section-heading">Continents</h3>
            <h4 class="subheading">Checked</h4>
            <ul class="checked-continents list"></ul>
            <h4 class="subheading">Unchecked</h4>
            <ul class="unchecked-continents list"></ul>
        </section>
        </div>
        
        <div class="environments-style">
        <section id="environments" class="section environments-section">
            <h3 class="section-heading">What are you looking for?</h3>
            <h4 class="subheading">Checked</h4>
            <ul class="checked-environments list"></ul>
            <h4 class="subheading">Unchecked</h4>
            <ul class="unchecked-environments list"></ul>
        </section>
        </div>
        
        <div class ="activities-style">
        <section id="activities" class="section activities-section">
            <h3 class="section-heading">Activities</h3>
            <h4 class="subheading">Checked</h4>
            <ul class="checked-activities list"></ul>
            <h4 class="subheading">Unchecked</h4>
            <ul class="unchecked-activities list"></ul>
        </section>
        </div>
        
        <section id="date" class="section date-section">
            <h3 class="section-heading">Date Range</h3>
            <label for="holidayStartDate" class="form-label">Start Date:</label>
            <input type="date" id="holidayStartDate" class="form-input" />
            <label for="holidayEndDate" class="form-label">End Date:</label>
            <input type="date" id="holidayEndDate" class="form-input" />
        </section>
        
        <section id="proceed" class="section proceed-section">
            <a href="swipe.html" class="proceed-button">Finish</a>
        </section>
       
       </form>
    </main>
    
    <footer class="site-footer">
    </footer>
    
    
</body>
</html>
